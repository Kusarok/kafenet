<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Kafenet has repositioned around AI-assisted financial market analysis and model-assisted research for analysts." />
  <title>Kafenet | Research focus</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --surface: #ffffff;
      --ink: #142033;
      --text: #344054;
      --muted: #667085;
      --line: #e4e7ec;
      --brand: #1d4f75;
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
    }

    main {
      width: min(720px, 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 32px;
    }

    img {
      width: 48px;
      height: 48px;
      object-fit: contain;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 3px;
      background: #fff;
    }

    h1 {
      margin: 18px 0 12px;
      color: var(--ink);
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      line-height: 1.15;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      border-radius: var(--radius);
      background: var(--brand);
      color: #fff;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <img src="logo.png" alt="Kafenet logo" onerror="this.style.display='none'" />
    <h1>Kafenet is focused on AI-assisted market intelligence.</h1>
    <p>Our website now presents Kafenet as an AI research and engineering organization developing decision-support tools for financial analysts.</p>
    <a href="index.html">Go to homepage</a>
  </main>
</body>
</html>
